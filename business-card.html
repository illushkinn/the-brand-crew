<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Brand Crew — Tarjeta Personal</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800;900&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Iosevka Font (via Fontsource) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka-aile@5.1.0/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka-aile@5.1.0/700.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka-aile@5.1.0/900.css">

  <style>
    /* =========================================================
       RESET
       ========================================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* =========================================================
       VARIABLES — Blanco + Negro + Terracota
       ========================================================= */
    :root {
      --bg: #FFFFFF;
      --text: #1A1A1A;
      --gray: #666666;
      --terracotta: #e25c3a;
      --font-display: 'Iosevka Aile', 'Iosevka', 'Darker Grotesque', 'Arial Black', 'Impact', sans-serif;
      --font-body: 'Sora', 'Inter', 'Segoe UI', sans-serif;
    }

    /* =========================================================
       SCREEN STYLES (preview)
       ========================================================= */
    @media screen {
      body {
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2520 50%, #1a1a1a 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2.5rem 1rem;
        font-family: var(--font-body);
      }

      .cards-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3rem;
        max-width: 100%;
      }

      .card {
        width: 90mm;
        height: 50mm;
        border-radius: 2px;
        cursor: default;
      }

      .card-label {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 9pt;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: rgba(255, 255, 255, 0.25);
        text-align: center;
        margin-bottom: 0.5rem;
      }

      .card-pair {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    }

    /* =========================================================
       FRONT — Anverso
       ========================================================= */
    /* =========================================================
       FRONT — Anverso (bento split)
       ========================================================= */
    .card-front {
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--text);
    }

    .front-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 4mm 5mm;
      gap: 2mm;
    }

    /* --- Left: logo + brand name --- */
    .front-left {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 3mm;
    }

    .front-logo {
      width: 18mm;
      height: 18mm;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 14pt;
      line-height: 1.05;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      text-align: center;
    }

    .brand-name .line {
      display: block;
    }

    /* =========================================================
       BACK — Reverso (Glassmorphism Claro)
       ========================================================= */
    .card-back {
      background: #f7f7f5;
      color: var(--text);
      border: 1px solid rgba(0, 0, 0, 0.06);
      padding: 3.5mm 4mm;
      position: relative;
      overflow: hidden;
    }

    /* Ambient brand glow */
    .card-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 25% 40%, rgba(226, 92, 58, 0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .back-inner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      position: relative;
      z-index: 1;
    }



    /* --- Pricing panels (glass) --- */
    .back-pricing {
      display: flex;
      gap: 2.5mm;
      width: 100%;
    }

    .back-pricing-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 1px;
      padding: 2mm 2.5mm;
    }

    .back-pricing-label {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 5.5pt;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 1mm;
    }

    .back-pricing-amount {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 10pt;
      color: #000000;
      line-height: 1.2;
      text-align: center;
    }

    .back-pricing-suffix {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 5pt;
      color: #000000;
      margin-top: 0.5mm;
      letter-spacing: 1.5px;
      text-align: center;
      text-transform: uppercase;
    }

    /* --- Bottom row: tagline + domain --- */
    .back-bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: auto;
      padding-top: 2mm;
    }

    .back-tagline {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 6pt;
      color: var(--gray);
      letter-spacing: 0.5px;
    }

    .back-domain {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 6pt;
      color: #003DA5;
      letter-spacing: 0.5px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    /* =========================================================
       PRINT STYLES
       ========================================================= */
    @media print {
      @page {
        size: 90mm 50mm;
        margin: 0;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: none;
        min-height: auto;
      }

      body {
        display: block;
      }

      .cards-wrapper {
        display: block;
        padding: 0;
        margin: 0;
        gap: 0;
      }

      .card-pair {
        display: block;
        margin: 0;
      }

      .card-label {
        display: none !important;
      }

      .card {
        width: 90mm;
        height: 50mm;
        box-shadow: none !important;
        border-radius: 0;
        page-break-after: always;
        transform: none !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .card:last-child {
        page-break-after: auto;
      }


    }

  </style>
</head>
<body>

<div class="cards-wrapper">

  <!-- ==================== FRONT ==================== -->
  <div class="card-pair">
    <div class="card-label">Anverso / Front</div>
    <div class="card card-front">
      <div class="front-inner">
        <img class="front-logo" src="assets/logo(1).png" alt="The Brand Crew">
        <div class="brand-name">
          <span class="line">THE</span>
          <span class="line">BRAND</span>
          <span class="line">CREW</span>
        </div>

      </div>
    </div>
  </div>

  <!-- ==================== BACK ==================== -->
  <div class="card-pair">
    <div class="card-label">Reverso / Back</div>
    <div class="card card-back">
      <div class="back-inner">

        <!-- Pricing panels -->
        <div class="back-pricing">
          <div class="back-pricing-panel">
            <div class="back-pricing-label">Diseño + Desarrollo</div>
            <div class="back-pricing-amount">ARS 140.000</div>
            <div class="back-pricing-suffix">ARS</div>
          </div>
          <div class="back-pricing-panel">
            <div class="back-pricing-label">Dominio .com</div>
            <div class="back-pricing-amount">ARS 20.000</div>
            <div class="back-pricing-suffix">2 AÑOS</div>
          </div>
        </div>

        <!-- Bottom row: tagline + domain -->
        <div class="back-bottom-row">
          <span class="back-tagline">Páginas web que garpan — Para comercios<br>que laburan</span>
          <span class="back-domain">thebrandcrew.lat</span>
        </div>

      </div>
    </div>
  </div>

</div>


</body>
</html>

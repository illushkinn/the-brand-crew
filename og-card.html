<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <title>OG Card - The Brand Crew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@500;700;800&family=Grand+Hotel&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Rethink Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Background gradients */
    .bg-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 140% 120% at 5% 8%, oklch(0.58 0.18 32 / 0.8) 0%, transparent 50%),
        radial-gradient(ellipse 110% 90% at 95% 14%, oklch(0.58 0.18 32 / 0.60) 0%, transparent 48%),
        radial-gradient(ellipse 100% 80% at 48% 50%, oklch(0.82 0.2 125 / 0.70) 0%, transparent 50%),
        radial-gradient(ellipse 110% 90% at 20% 82%, oklch(0.58 0.18 32 / 0.60) 0%, transparent 46%),
        radial-gradient(ellipse 120% 100% at 78% 78%, oklch(0.58 0.18 32 / 0.85) 0%, transparent 48%);
    }

    /* Floating shapes */
    .shape {
      position: absolute;
      filter: blur(40px);
      opacity: 0.6;
      border-radius: 50%;
    }
    .shape1 {
      width: 280px;
      height: 240px;
      background: linear-gradient(135deg, oklch(0.58 0.18 32), #dd614c);
      top: -60px;
      right: 100px;
    }
    .shape2 {
      width: 200px;
      height: 220px;
      background: linear-gradient(225deg, oklch(0.82 0.2 125), #8cd44a);
      bottom: -40px;
      left: 150px;
    }
    .shape3 {
      width: 160px;
      height: 170px;
      background: linear-gradient(180deg, oklch(0.58 0.18 32), #e8a085);
      top: 50%;
      right: -40px;
      transform: translateY(-50%);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 80px;
      max-width: 900px;
    }

    .brand {
      font-family: 'Grand Hotel', cursive;
      font-size: 56px;
      color: oklch(0.95 0.004 280);
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .headline {
      font-family: 'Rethink Sans', sans-serif;
      font-weight: 800;
      font-size: 72px;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: oklch(0.95 0.004 280);
      margin-bottom: 32px;
      text-shadow: 0 2px 4px oklch(0 0 0 / 0.3);
    }

    .headline .accent {
      color: oklch(0.58 0.18 32);
    }

    .tagline {
      font-size: 32px;
      font-weight: 500;
      color: oklch(0.8 0.008 280);
      margin-bottom: 40px;
      letter-spacing: -0.01em;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      background: oklch(0.58 0.18 32);
      color: white;
      padding: 20px 48px;
      border-radius: 12px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow: 0 8px 24px oklch(0.58 0.18 32 / 0.4);
    }

    .price {
      font-size: 24px;
      font-weight: 500;
      color: oklch(0.82 0.2 125);
      margin-top: 24px;
    }

    .price-amount {
      font-weight: 700;
      font-size: 28px;
    }

    /* Bottom brand mark */
    .bottom-mark {
      position: absolute;
      bottom: 32px;
      right: 48px;
      font-size: 18px;
      color: oklch(0.6 0.008 280);
      z-index: 15;
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
  <div class="shape shape3"></div>

  <div class="content">
    <div class="brand">The Brand Crew</div>
    <h1 class="headline">
      Websites That<br>
      <span class="accent">Actually Work</span>
    </h1>
    <p class="tagline">
      Design + Development + Domain + Hosting
    </p>
    <div class="cta">
      Get Started
    </div>
    <div class="price">
      From <span class="price-amount">$240.000 ARS</span>
    </div>
  </div>

  <div class="bottom-mark">thebrandcrew.lat</div>
</body>
</html>
